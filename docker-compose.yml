version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: career_backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    restart: always

  frontend:
    build:
      context: ./frontend

    container_name: career_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend
      
    restart: always